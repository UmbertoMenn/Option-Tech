name: Email portfolio ingest

on:
  schedule:
    # Ogni 30 minuti. Aumenta l'intervallo (es. */15 → */60) se serve
    # restare più larghi con i minuti gratuiti di GitHub Actions.
    - cron: '*/30 * * * *'
  workflow_dispatch: {} # permette anche l'avvio manuale da GitHub, utile per testare

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsx scripts/email-ingest/ingest.ts
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_SENDER_FILTER: ${{ secrets.GMAIL_SENDER_FILTER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TARGET_PORTFOLIO_ID: ${{ secrets.TARGET_PORTFOLIO_ID }}
